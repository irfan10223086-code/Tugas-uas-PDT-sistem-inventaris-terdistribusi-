version: '3.8'

services:
  db-node-a:
    image: postgres:15
    container_name: db-node-a
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: inventaris_a
    ports:
      - "5433:5432"
    volumes:
      - pgdata-node-a:/var/lib/postgresql/data

  db-node-b:
    image: postgres:15
    container_name: db-node-b
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: inventaris_b
    ports:
      - "5434:5432"
    volumes:
      - pgdata-node-b:/var/lib/postgresql/data

volumes:
  pgdata-node-a:
  pgdata-node-b:
